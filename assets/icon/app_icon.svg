<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#4B2ED6"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDE9FF"/>
    </linearGradient>
  </defs>
  <!-- macOS squircle-ish rounded background -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <!-- subtle inner highlight -->
  <rect x="64" y="64" width="896" height="448" rx="200" fill="#FFFFFF" opacity="0.06"/>
  <!-- envelope body -->
  <rect x="232" y="352" width="560" height="380" rx="56" fill="url(#flap)"/>
  <!-- envelope flap (open, pointing down into the body) -->
  <path d="M232 408 L482 610 Q512 632 542 610 L792 408 L792 430 L542 640 Q512 662 482 640 L232 430 Z"
        fill="#4B2ED6" opacity="0.28"/>
  <path d="M244 372 L482 566 Q512 588 542 566 L780 372 Q764 352 736 352 L288 352 Q260 352 244 372 Z"
        fill="#5B3DF0"/>
  <!-- notification dot -->
  <circle cx="780" cy="330" r="96" fill="#FF5C7A"/>
  <circle cx="780" cy="330" r="96" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.9"/>
</svg>
