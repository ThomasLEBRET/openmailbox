name: Build macOS DMG

# Manual only: a distributable macOS build needs an Apple Developer
# signing identity, which isn't available on CI. Build the DMG locally
# (the local signed build works) until code-signing secrets are set up.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release
      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "OpenMailbox" -srcfolder . -ov -format UDZO OpenMailbox.dmg
      - uses: softprops/action-gh-release@v1
        with:
          files: build/macos/Build/Products/Release/OpenMailbox.dmg
